name: Spring Modulith Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compatibility:
    name: Modulith ${{ matrix.modulith-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        modulith-version: ["2.0.5", "2.0.6"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Verify against Modulith ${{ matrix.modulith-version }}
        run: |
          mvn verify -pl eventus-core,eventus-spring -am \
            --batch-mode --no-transfer-progress \
            -Dspring-modulith.version=${{ matrix.modulith-version }}
