name: Spring Modulith Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compatibility:
    name: Modulith ${{ matrix.modulith-version }}
    runs-on: ubuntu-latest
    fail-fast: false

    strategy:
      matrix:
        modulith-version: ["1.2.6", "1.3.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify against Modulith ${{ matrix.modulith-version }}
        run: |
          mvn verify -pl eventus-core,eventus-spring -am \
            --batch-mode --no-transfer-progress \
            -Dspring-modulith.version=${{ matrix.modulith-version }}
