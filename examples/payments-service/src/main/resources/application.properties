spring.application.name=payments-service

server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:payments;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# Spring Modulith: persist event publications
spring.modulith.events.schema-initialization.enabled=true

# Actuator: expose all endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

logging.level.io.eventus.examples=INFO
logging.level.io.eventus=DEBUG
