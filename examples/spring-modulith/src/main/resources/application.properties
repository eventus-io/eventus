spring.application.name=spring-modulith-example

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:bookstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring Modulith: persist event publications for reliable delivery
spring.modulith.events.schema-initialization.enabled=true

# Actuator: expose all endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Eventus dashboard at /eventus
eventus.ui.enabled=true

logging.level.io.eventus.examples=INFO
logging.level.io.eventus=DEBUG
